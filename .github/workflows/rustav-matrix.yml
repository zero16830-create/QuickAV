name: RustAV CI

on:
  push:
    paths:
      - "src/**"
      - "include/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "UNITY_MOBILE_BUILD.md"
      - "UNITY_PLUGIN_ABI.md"
      - "UNITY_PLUGIN_PACKAGE_LAYOUT.md"
      - "UNITY_RELEASE_AUTOMATION.md"
      - "UNITY_WIN_IOS_ANDROID_PLAN.md"
      - "UnityAVExample/**"
      - "ios-staticlib/**"
      - "third_party/**"
      - "scripts/**"
      - ".github/workflows/rustav-matrix.yml"
  pull_request:
    paths:
      - "src/**"
      - "include/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "UNITY_MOBILE_BUILD.md"
      - "UNITY_PLUGIN_ABI.md"
      - "UNITY_PLUGIN_PACKAGE_LAYOUT.md"
      - "UNITY_RELEASE_AUTOMATION.md"
      - "UNITY_WIN_IOS_ANDROID_PLAN.md"
      - "UnityAVExample/**"
      - "ios-staticlib/**"
      - "third_party/**"
      - "scripts/**"
      - ".github/workflows/rustav-matrix.yml"
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  windows-validate:
    name: Windows Library Check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\.vcpkg
          key: ${{ runner.os }}-vcpkg-x64-windows-${{ hashFiles('.github/workflows/rustav-matrix.yml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-x64-windows-

      - name: Setup FFmpeg (vcpkg)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vcpkgRoot = Join-Path $env:GITHUB_WORKSPACE ".vcpkg"

          if (-not (Test-Path "$vcpkgRoot\.git")) {
            if (Test-Path $vcpkgRoot) {
              Remove-Item -LiteralPath $vcpkgRoot -Recurse -Force
            }
            git clone --depth 1 https://github.com/microsoft/vcpkg $vcpkgRoot
          }

          if (-not (Test-Path "$vcpkgRoot\vcpkg.exe")) {
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          }

          & "$vcpkgRoot\vcpkg.exe" install "ffmpeg:x64-windows" --disable-metrics

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_DEFAULT_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_DYNAMIC=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          "$vcpkgRoot\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$vcpkgRoot\installed\x64-windows\tools\ffmpeg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows Unity Plugin
        shell: pwsh
        run: |
          python scripts/ci/build_unity_plugins.py --project-root "$env:GITHUB_WORKSPACE" --platform windows --output-root "target/unity-package/windows"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustav-windows-x86_64-unity-plugin
          path: target/unity-package/windows
          if-no-files-found: error

  android-build:
    name: Android arm64 Build
    runs-on: ubuntu-latest
    env:
      CARGO_NDK_PLATFORM: 21

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev make perl pkg-config yasm nasm

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Android Unity Plugin
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          python3 scripts/ci/build_unity_plugins.py --project-root "$GITHUB_WORKSPACE" --platform android --output-root "target/unity-package/android" --cargo-ndk-output "target/android-unity-libs" --abi arm64-v8a

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustav-android-arm64-v8a-unity-plugin
          path: target/unity-package/android
          if-no-files-found: error

  ios-build:
    name: iOS XCFramework Build
    runs-on: macos-latest
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/ios-staticlib

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Show Xcode Version
        run: |
          xcodebuild -version

      - name: Build iOS Unity Plugin
        run: |
          python3 scripts/ci/build_unity_plugins.py --project-root "$GITHUB_WORKSPACE" --platform ios --manifest-path "ios-staticlib/Cargo.toml" --target-dir "target/ios-staticlib" --output-root "target/unity-package/ios" --xcframework-output "target/apple-unity/RustAV.xcframework"

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustav-ios-unity-plugin
          path: target/unity-package/ios
          if-no-files-found: error

  unity-plugins-package:
    name: Package Unity Plugins Bundle
    needs:
      - windows-validate
      - android-build
      - ios-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: rustav-windows-x86_64-unity-plugin
          path: artifacts/windows

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: rustav-android-arm64-v8a-unity-plugin
          path: artifacts/android

      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: rustav-ios-unity-plugin
          path: artifacts/ios

      - name: Assemble Unity Plugins Bundle
        run: |
          python3 scripts/ci/build_unity_plugins.py --project-root "$GITHUB_WORKSPACE" --platform package --windows-artifact "artifacts/windows" --android-artifact "artifacts/android" --ios-artifact "artifacts/ios" --bundle-root "UnityPlugins" --zip-output "RustAV-UnityPlugins.zip"

      - name: Upload Unity Plugins Bundle
        uses: actions/upload-artifact@v4
        with:
          name: rustav-unity-plugins-bundle
          path: RustAV-UnityPlugins.zip
          if-no-files-found: error
