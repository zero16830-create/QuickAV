name: RustAV Matrix

on:
  push:
    paths:
      - "src/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rustav-matrix.yml"
  pull_request:
    paths:
      - "src/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rustav-matrix.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup FFmpeg (vcpkg)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          git clone --depth 1 https://github.com/microsoft/vcpkg $vcpkgRoot
          & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          & "$vcpkgRoot\vcpkg.exe" install "ffmpeg:x64-windows"

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_DEFAULT_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_DYNAMIC=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          "$vcpkgRoot\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$vcpkgRoot\installed\x64-windows\tools\ffmpeg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cargo Check
        run: cargo check

      - name: Cargo Check Example
        run: cargo check --example test_player

      - name: Run Native-Aligned Matrix (CI)
        shell: pwsh
        run: |
          ./examples/run_native_test_matrix.ps1 -Ci -Cases all -SkipRtsp -MaxSeconds 3
